<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#1a472a">
<meta name="description" content="Agri-Fine Ventures - Smart Greenhouse Management System">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agri-fine">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/logo.png">
<title>Agri-Fine Ventures — Smart Farm Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
</head>
<body>
  <!-- Pre-login Splash Animation -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-content">
      <div class="splash-logo"><img src="/logo.png" alt="Agri-Fine" style="width:120px;height:120px;object-fit:contain;"></div>
      <h1 class="splash-title">Agri-Fine<span>Ventures</span></h1>
      <p class="splash-tagline">Smart Greenhouse Management</p>
      <div class="splash-loader">
        <div class="loader-leaf leaf1">🌿</div>
        <div class="loader-leaf leaf2">🍃</div>
        <div class="loader-leaf leaf3">🌱</div>
        <div class="loader-leaf leaf4">🍀</div>
      </div>
    </div>
    <div class="splash-overlay"></div>
  </div>

  <div id="app">
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-bg">
      <div class="login-overlay"></div>
      <div class="floating-leaves">
        <div class="leaf l1">🌿</div>
        <div class="leaf l2">🍃</div>
        <div class="leaf l3">🌱</div>
        <div class="leaf l4">🍀</div>
        <div class="leaf l5">🌿</div>
      </div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon"><img src="/logo.png" alt="Agri-Fine" style="width:80px;height:80px;object-fit:contain;"></div>
        <h1>Agri-Fine<span>Ventures</span></h1>
        <p>Smart Greenhouse Management Platform</p>
      </div>
      <div class="login-form">
        <div class="role-selector">
          <button class="role-btn active" data-role="admin">
            <span class="role-icon">👑</span>
            <span>Admin</span>
          </button>
          <button class="role-btn" data-role="supervisor">
            <span class="role-icon">👨‍🌾</span>
            <span>Supervisor</span>
          </button>
          <button class="role-btn" data-role="agronomist">
            <span class="role-icon">🔬</span>
            <span>Agronomist</span>
          </button>
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="text" id="login-username" placeholder="Enter your email" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="off">
        </div>
        <button class="login-btn" onclick="handleLogin()">
          <span>Enter Farm Dashboard</span>
          <span class="btn-arrow">→</span>
        </button>
        <div style="text-align:center;margin-top:16px">
          <a href="#" onclick="openForgotPasswordModal(); return false;" style="color:var(--blue-water);text-decoration:none;font-size:0.9rem">Forgot Password?</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="admin-screen" class="screen dashboard-screen">
    <button class="sidebar-toggle" onclick="toggleSidebar('admin')" aria-label="Toggle menu">
      <span>☰</span>
    </button>
    <div class="sidebar-overlay" onclick="closeSidebar('admin')"></div>
    <div id="admin-nav" class="sidebar"></div>
    <div class="main-content">
      <div id="admin-content"></div>
      <div id="supervisor-content"></div>
      <div id="agronomist-content"></div>
    </div>
    <div id="ai-widget-container"></div>
  </div>

  <!-- Worker Dashboard -->
  <div id="supervisor-screen" class="screen dashboard-screen">
    <button class="sidebar-toggle" onclick="toggleSidebar('supervisor')" aria-label="Toggle menu">
      <span>☰</span>
    </button>
    <div class="sidebar-overlay" onclick="closeSidebar('supervisor')"></div>
    <div id="supervisor-nav" class="sidebar supervisor-sidebar"></div>
    <div class="main-content">
      <div id="supervisor-content"></div>
    </div>
  </div>

  <!-- Agronomist Dashboard -->
  <div id="agronomist-screen" class="screen dashboard-screen">
    <button class="sidebar-toggle" onclick="toggleSidebar('agronomist')" aria-label="Toggle menu">
      <span>☰</span>
    </button>
    <div class="sidebar-overlay" onclick="closeSidebar('agronomist')"></div>
    <div id="agronomist-nav" class="sidebar agro-sidebar"></div>
    <div class="main-content">
      <div id="agronomist-content"></div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgot-password-modal" class="modal-overlay" style="display:none">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3>🔐 Reset Password</h3>
        <button onclick="closeForgotPasswordModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer">&times;</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:16px;color:#000">Enter your username to request a password reset. The admin will be notified and can reset your password.</p>
        <div class="input-group">
          <label>Email</label>
          <input type="text" id="forgot-username" placeholder="Enter your email">
        </div>
        <button onclick="submitPasswordResetRequest()" class="btn-primary" style="width:100%;margin-top:12px">📧 Submit Request</button>
      </div>
    </div>
  </div>

  

  <!-- Task Complete Modal -->
  <div id="task-modal" class="modal-overlay" style="display:none">
    <div class="task-modal">
      <div class="task-modal-icon">✅</div>
      <h3 id="task-modal-title">Task Complete!</h3>
      <p id="task-modal-msg"></p>
      <div class="task-modal-actions">
        <button class="btn-secondary" onclick="closeTaskModal()">Close</button>
        <button class="btn-primary" onclick="confirmTaskComplete()">Confirm Complete</button>
      </div>
    </div>
  </div>

  <!-- Notification Toast -->
  <div id="toast-container"></div>
</div>

<script src="state.js"></script>
<script src="greenhouse-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="admin.js"></script>
<script src="supervisor.js"></script>
<script src="agronomist.js"></script>
<script src="app.js"></script>
<script>
  // PWA Install Prompt Handler
  let deferredPrompt;
  
  // Listen for the beforeinstallprompt event
  window.addEventListener('beforeinstallprompt', (e) => {
    console.log('PWA: beforeinstallprompt fired');
    // Prevent Chrome 67 and earlier from automatically showing the prompt
    e.preventDefault();
    // Store the event for later use
    deferredPrompt = e;
    // Show custom install button immediately
    showInstallPrompt();
  });

  // Also check if app is already installed
  window.addEventListener('appinstalled', (e) => {
    console.log('PWA: App was installed');
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'none';
  });

  function showInstallPrompt() {
    // Remove existing button if any
    const existing = document.getElementById('pwa-install-btn');
    if (existing) existing.remove();
    
    if (!deferredPrompt) {
      console.log('PWA: No deferredPrompt available');
      return;
    }
    
    // Create install button
    const installBtn = document.createElement('button');
    installBtn.id = 'pwa-install-btn';
    installBtn.innerHTML = '📲 Install App';
    installBtn.onclick = installPWA;
    installBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;padding:14px 24px;background:#1a472a;color:#fff;border:none;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);display:flex;align-items:center;gap:10px;animation:pwaPulse 2s infinite;';
    
    // Add animation styles dynamically
    const style = document.createElement('style');
    style.textContent = `@keyframes pwaPulse {0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}`;
    document.head.appendChild(style);
    
    document.body.appendChild(installBtn);
    console.log('PWA: Install button shown');
  }

  async function installPWA() {
    if (!deferredPrompt) {
      // Fallback: show browser's native install UI
      alert('To install: Look for the install icon in your browser\'s address bar, or use Menu → Install Agri-fine Ventures');
      return;
    }
    
    // Show the install prompt
    deferredPrompt.prompt();
    
    // Wait for user response
    const { outcome } = await deferredPrompt.userChoice;
    console.log('PWA: Install prompt outcome:', outcome);
    
    // Clear the deferred prompt
    deferredPrompt = null;
    
    // Remove the install button
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.remove();
  }

  // Register Service Worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then((registration) => {
          console.log('PWA Service Worker registered:', registration.scope);
        })
        .catch((error) => {
          console.log('PWA Service Worker registration failed:', error);
        });
    });
  } else {
    console.log('PWA: Service Worker not supported');
  }
</script>
</body>
</html>
